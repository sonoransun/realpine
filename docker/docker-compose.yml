# Alpine P2P Cluster — docker compose up
#
# Spins up a group of Alpine nodes on a shared bridge network.
# Nodes discover each other automatically via UDP broadcast beacon
# (port 8089) and multicast discovery (224.0.1.75:41750).
#
# Each node exposes its REST API on a unique host port:
#   node1 → http://localhost:8081/status
#   node2 → http://localhost:8082/status
#   node3 → http://localhost:8083/status
#
# Verify the cluster formed:
#   curl -s http://localhost:8081/peers | jq .
#
# Scale beyond 3 nodes by adding more services following the pattern,
# or use the profile "bench" to add nodes 4 and 5:
#   docker compose --profile bench up

networks:
  alpine-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

x-alpine-common: &alpine-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  networks:
    - alpine-net
  cap_add:
    - NET_ADMIN
  environment: &alpine-env
    PORT: "9000"
    REST_PORT: "8080"
    REST_BIND_ADDRESS: "0"
    BEACON_PORT: "8089"
    BEACON_ENABLED: "true"
    BROADCAST_ENABLED: "true"
    BROADCAST_PORT: "8090"
    WIFI_DISCOVERY_ENABLED: "true"
    WIFI_MULTICAST_GROUP: "224.0.1.75"
    WIFI_MULTICAST_PORT: "41750"
    LOG_LEVEL: "${LOG_LEVEL:-Info}"
    TOR_ENABLED: "false"
    DLNA_ENABLED: "false"
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:8080/status"]
    interval: 5s
    timeout: 3s
    start_period: 10s
    retries: 3
  restart: unless-stopped

services:
  # ── Core cluster (3 nodes) ───────────────────────────────────────────
  node1:
    <<: *alpine-common
    container_name: alpine-node1
    hostname: node1
    networks:
      alpine-net:
        ipv4_address: 172.28.1.1
    ports:
      - "8081:8080"
    environment:
      <<: *alpine-env
      NODE_NAME: "node1"

  node2:
    <<: *alpine-common
    container_name: alpine-node2
    hostname: node2
    networks:
      alpine-net:
        ipv4_address: 172.28.1.2
    ports:
      - "8082:8080"
    environment:
      <<: *alpine-env
      NODE_NAME: "node2"
    depends_on:
      node1:
        condition: service_healthy

  node3:
    <<: *alpine-common
    container_name: alpine-node3
    hostname: node3
    networks:
      alpine-net:
        ipv4_address: 172.28.1.3
    ports:
      - "8083:8080"
    environment:
      <<: *alpine-env
      NODE_NAME: "node3"
    depends_on:
      node1:
        condition: service_healthy

  # ── Extra nodes (activate with: docker compose --profile bench up) ──
  node4:
    <<: *alpine-common
    container_name: alpine-node4
    hostname: node4
    profiles: ["bench"]
    networks:
      alpine-net:
        ipv4_address: 172.28.1.4
    ports:
      - "8084:8080"
    environment:
      <<: *alpine-env
      NODE_NAME: "node4"
    depends_on:
      node1:
        condition: service_healthy

  node5:
    <<: *alpine-common
    container_name: alpine-node5
    hostname: node5
    profiles: ["bench"]
    networks:
      alpine-net:
        ipv4_address: 172.28.1.5
    ports:
      - "8085:8080"
    environment:
      <<: *alpine-env
      NODE_NAME: "node5"
    depends_on:
      node1:
        condition: service_healthy
