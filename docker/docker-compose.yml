networks:
  alpine-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  alpine-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    networks:
      - alpine-net
    cap_add:
      - NET_ADMIN
    environment:
      PORT: "9000"
      REST_PORT: "8080"
      BEACON_PORT: "8089"
      BEACON_ENABLED: "true"
      BROADCAST_ENABLED: "true"
      BROADCAST_PORT: "8090"
      LOG_LEVEL: "${LOG_LEVEL:-Debug}"
      TOR_ENABLED: "false"
      DLNA_ENABLED: "false"
    deploy:
      replicas: ${NODES:-3}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/status"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
