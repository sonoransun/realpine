name: AlpineApp
options:
  bundleIdPrefix: com.alpine
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  AlpineApp:
    type: application
    platform: iOS
    sources:
      - AlpineApp
    settings:
      base:
        INFOPLIST_FILE: AlpineApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: AlpineApp/AlpineApp.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.alpine.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: AlpineApp/Info.plist
      properties:
        NSLocalNetworkUsageDescription: "Alpine App discovers and communicates with Alpine servers on your local network."
        NSBonjourServices:
          - "_alpine._tcp"
  AlpineAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - AlpineAppTests
    dependencies:
      - target: AlpineApp
    settings:
      base:
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
