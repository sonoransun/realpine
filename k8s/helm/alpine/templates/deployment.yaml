apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alpine.fullname" . }}
  labels:
    {{- include "alpine.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "alpine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alpine.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.service.restPort }}
              name: rest-api
            - containerPort: {{ .Values.service.beaconPort }}
              name: beacon
            - containerPort: {{ .Values.service.broadcastPort }}
              name: broadcast
            - containerPort: {{ .Values.service.protocolPort }}
              name: protocol
          env:
            - name: REST_PORT
              value: "{{ .Values.service.restPort }}"
            - name: REST_BIND_ADDRESS
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: BEACON_ENABLED
              value: "{{ .Values.config.beaconEnabled }}"
            - name: BROADCAST_ENABLED
              value: "{{ .Values.config.broadcastEnabled }}"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: rest-api
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: rest-api
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "alpine.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
