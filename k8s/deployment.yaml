apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpine
  labels:
    app: alpine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: alpine
  template:
    metadata:
      labels:
        app: alpine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alpine
          image: alpine:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: rest-api
            - containerPort: 8089
              name: beacon
            - containerPort: 8090
              name: broadcast
            - containerPort: 9000
              name: protocol
          env:
            - name: REST_PORT
              value: "8080"
            - name: REST_BIND_ADDRESS
              value: "0.0.0.0"
            - name: BEACON_ENABLED
              value: "true"
            - name: BEACON_PORT
              value: "8089"
            - name: BROADCAST_ENABLED
              value: "true"
            - name: BROADCAST_PORT
              value: "8090"
            - name: LOG_LEVEL
              value: "Info"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: alpine-config
          readinessProbe:
            httpGet:
              path: /status
              port: rest-api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: rest-api
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
