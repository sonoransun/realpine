# Alpine REST bridge — sample configuration
#
# Drop this file at /etc/alpine/alpine.conf and start the daemon with
#   AlpineRestBridge --configFile /etc/alpine/alpine.conf
#
# Every value here can also be overridden by environment variables (same name,
# upper-cased with underscores) and by command-line flags.  Precedence is:
#   configFile < command-line < environment
#
# --------------------------------------------------------------------------

# --- Network & ports ------------------------------------------------------
IP Address            0.0.0.0
Port                  9000
REST Port             8080
REST Bind Address     0.0.0.0

# --- HTTP server tuning ---------------------------------------------------
HTTP Min Threads              4
HTTP Max Threads              32
HTTP Max Connections          512
HTTP Max Connections Per IP   16
HTTP Idle Timeout Seconds     60
HTTP Keepalive Max Requests   100
HTTP Write Timeout Seconds    10
Shutdown Drain Seconds        5

# --- Discovery & cluster --------------------------------------------------
Beacon Enabled        true
Beacon Port           8089
Broadcast Enabled     true
Broadcast Port        8090
Region                default
# WiFi Multicast Group  224.0.1.75
# WiFi Multicast Port   41750

# --- Authentication & security --------------------------------------------
# Leave blank to auto-generate a 64-char hex key at startup (logged once).
# ALPINE_API_KEY        <your-key-here>
CORS Origin           *

# --- Optional services ----------------------------------------------------
Log Level             Info
# No New Privs        false
Tor Enabled           false
DLNA Enabled          false
FUSE Enabled          false
FUSE Mount Point      /var/lib/alpine/vfs
FUSE Cache TTL        60
Tracing Enabled       false
# OTLP Endpoint         http://otel-collector:4318

# --- Webhooks -------------------------------------------------------------
# Webhook Secret        <hmac-secret>
Webhook Max Retries   3
Webhook Timeout Seconds 10
